<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRT GAME HUB</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    :root {
        --blue: #00d4ff;
        --purple: #8b5cf6;
        --cyan: #22d3ee;
    }

    html, body {
        height: 100%;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
        background: #020208;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
        position: relative;
    }

    /* Animated Background */
    .bg {
        position: fixed;
        inset: 0;
        z-index: -2;
        background: #020208;
    }

    .bg::before {
        content: '';
        position: absolute;
        inset: 0;
        background: 
            radial-gradient(600px circle at 15% 20%, rgba(139, 92, 246, 0.15), transparent 40%),
            radial-gradient(500px circle at 85% 30%, rgba(0, 212, 255, 0.15), transparent 40%),
            radial-gradient(700px circle at 50% 80%, rgba(34, 211, 238, 0.1), transparent 50%);
        animation: pulse 15s ease-in-out infinite alternate;
    }

    .grid {
        position: fixed;
        inset: 0;
        z-index: -1;
        background-image: 
            linear-gradient(rgba(139, 92, 246, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px);
        background-size: 50px 50px;
        mask-image: radial-gradient(ellipse at center, black 40%, transparent 70%);
    }

    @keyframes pulse {
        0% { opacity: 0.8; transform: scale(1); }
        100% { opacity: 1; transform: scale(1.05); }
    }

    /* Header */
    header {
        text-align: center;
        padding: 70px 20px 30px;
        position: relative;
    }

    .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: var(--cyan);
        margin-bottom: 24px;
        padding: 8px 16px;
        border: 1px solid rgba(34, 211, 238, 0.2);
        border-radius: 999px;
        background: rgba(34, 211, 238, 0.05);
        box-shadow: 0 0 20px rgba(34, 211, 238, 0.15), inset 0 0 10px rgba(34, 211, 238, 0.05);
        backdrop-filter: blur(10px);
    }

    .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--cyan);
        box-shadow: 0 0 10px var(--cyan);
        animation: blink 2s infinite;
    }

    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
    }

    h1 {
        font-size: clamp(2.8rem, 9vw, 5.5rem);
        font-weight: 900;
        letter-spacing: -0.03em;
        line-height: 0.9;
        margin: 0;
        background: linear-gradient(180deg, #ffffff 0%, #cbd5e1 50%, #94a3b8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 0 30px rgba(139, 92, 246, 0.3));
        animation: titleIn 0.8s ease-out;
    }

    @keyframes titleIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Games Grid */
    main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .games {
        width: 100%;
        max-width: 1050px;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 28px;
        animation: fadeIn 1s ease-out 0.2s both;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 780px) {
        .games {
            grid-template-columns: 1fr;
            max-width: 460px;
            gap: 20px;
        }
        header { padding: 50px 20px 20px; }
    }

    /* Game Cards */
    .card {
        position: relative;
        display: block;
        text-decoration: none;
        color: inherit;
        padding: 48px 32px;
        min-height: 340px;
        background: linear-gradient(180deg, rgba(15, 15, 22, 0.9), rgba(5, 5, 10, 0.9));
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        isolation: isolate;
    }

    .card::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 28px;
        padding: 1.5px;
        background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent 30%, transparent 70%, rgba(255,255,255,0.1));
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        opacity: 0.5;
        transition: opacity 0.4s;
    }

    .card::after {
        content: '';
        position: absolute;
        inset: -2px;
        background: var(--grad);
        border-radius: 28px;
        filter: blur(30px);
        opacity: 0;
        z-index: -1;
        transition: opacity 0.4s;
    }

    .card:hover {
        transform: translateY(-8px);
        border-color: rgba(255, 255, 255, 0.15);
    }

    .card:hover::before { opacity: 1; }
    .card:hover::after { opacity: 0.25; }
    .card:active { transform: translateY(-4px) scale(0.99); }

    .card-inner {
        position: relative;
        z-index: 2;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    /* Flappy */
    .flappy {
        --grad: linear-gradient(135deg, #00d4ff, #0ea5e9);
        --color: #00d4ff;
    }
    .flappy:hover {
        box-shadow: 0 25px 80px -20px rgba(0, 212, 255, 0.4);
        background: linear-gradient(180deg, rgba(0, 212, 255, 0.12), rgba(5, 5, 10, 0.9));
    }

    /* Clicker */
    .clicker {
        --grad: linear-gradient(135deg, #8b5cf6, #ec4899);
        --color: #8b5cf6;
    }
    .clicker:hover {
        box-shadow: 0 25px 80px -20px rgba(139, 92, 246, 0.4);
        background: linear-gradient(180deg, rgba(139, 92, 246, 0.12), rgba(5, 5, 10, 0.9));
    }

    .icon-wrap {
        width: 96px;
        height: 96px;
        border-radius: 24px;
        display: grid;
        place-items: center;
        margin-bottom: 28px;
        position: relative;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        transition: all 0.4s;
    }

    .card:hover .icon-wrap {
        transform: translateY(-4px) scale(1.05) rotate(-2deg);
        background: rgba(255, 255, 255, 0.06);
    }

    .icon-wrap::before {
        content: '';
        position: absolute;
        inset: -1px;
        border-radius: 24px;
        background: var(--grad);
        filter: blur(20px);
        opacity: 0.5;
        z-index: -1;
        transition: opacity 0.4s;
    }

    .card:hover .icon-wrap::before { opacity: 0.8; }

    .icon {
        width: 48px;
        height: 48px;
        color: var(--color);
        filter: drop-shadow(0 0 12px currentColor);
        transition: transform 0.4s;
    }

    .card:hover .icon { transform: scale(1.1); }

    .card h2 {
        font-size: 1.9rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-bottom: 10px;
        color: white;
    }

    .card p {
        color: #94a3b8;
        font-size: 1rem;
        line-height: 1.5;
        margin-bottom: 28px;
        max-width: 260px;
    }

    .play {
        margin-top: auto;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 22px;
        font-weight: 600;
        font-size: 0.95rem;
        color: white;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        transition: all 0.3s;
    }

    .card:hover .play {
        background: var(--grad);
        border-color: transparent;
        box-shadow: 0 8px 20px -5px color-mix(in srgb, var(--color) 50%, transparent);
        transform: translateY(-2px);
    }

    .play svg {
        width: 16px;
        height: 16px;
        transition: transform 0.3s;
    }
    .card:hover .play svg { transform: translateX(3px); }

    /* Footer */
    footer {
        text-align: center;
        padding: 40px 20px 30px;
        color: #475569;
        font-size: 0.85rem;
        letter-spacing: 0.02em;
    }

    /* Focus */
    .card:focus-visible {
        outline: 2px solid var(--cyan);
        outline-offset: 4px;
    }

    /* Mobile tweaks */
    @media (max-width: 480px) {
        .card { padding: 40px 24px; min-height: 300px; }
        .icon-wrap { width: 84px; height: 84px; margin-bottom: 22px; }
        .icon { width: 42px; height: 42px; }
        .card h2 { font-size: 1.65rem; }
    }
</style>
</head>
<body>
    <div class="bg"></div>
    <div class="grid"></div>

    <header>
        <div class="brand">
            <span class="dot"></span>
            RRT GAME HUB
        </div>
        <h1>WÄHLE DEIN SPIEL</h1>
    </header>

    <main>
        <div class="games">
            <!-- FLAPPY -->
            <a href="https://rrt-game.github.io/RRT-FLAPPY-GAME/" class="card flappy">
                <div class="card-inner">
                    <div class="icon-wrap">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 7h.01"/>
                            <path d="M3.4 18H2a2 2 0 0 1 0-4h3.17A11.86 11.86 0 0 1 8 9.5c0-1.5-.5-3-1.5-4.2-1-.8-1.5-2-1.5-3.3a1 1 0 0 1 1.7-.7c1.3 1.3 3 2 4.8 2 2.5 0 4.7-1.3 6-3.4a1 1 0 0 1 1.8.6c0 1.9-.8 3.7-2.2 5a7.1 7.1 0 0 1-2.1 4.5"/>
                            <path d="M19.8 16.5A5.5 5.5 0 0 0 20 12a5.4 5.4 0 0 0-1-3.2"/>
                            <path d="M12 16a4 4 0 0 0 4 4h4"/>
                        </svg>
                    </div>
                    <h2>RRT-FLAPPY-GAME</h2>
                    <p>Weiche den Röhren aus und stelle deinen Highscore auf. Präzision ist alles.</p>
                    <span class="play">
                        Spielen
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M5 12h14M13 5l7 7-7 7"/>
                        </svg>
                    </span>
                </div>
            </a>

            <!-- CLICKER -->
            <a href="https://rrt-game.github.io/RRT-CLICKER/" class="card clicker">
                <div class="card-inner">
                    <div class="icon-wrap">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 14v-4"/>
                            <path d="M4 13V8a8 8 0 0 1 16 0v5"/>
                            <rect x="4" y="13" width="16" height="7" rx="4"/>
                            <path d="m8 3-1.5 1.5"/>
                            <path d="m16 3 1.5 1.5"/>
                            <path d="M9 6V4"/>
                            <path d="M15 6V4"/>
                        </svg>
                    </div>
                    <h2>RRT-CLICKER</h2>
                    <p>Klicke dich zum Sieg. Upgrades freischalten und werde zum Click-Master.</p>
                    <span class="play">
                        Spielen
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M5 12h14M13 5l7 7-7 7"/>
                        </svg>
                    </span>
                </div>
            </a>
        </div>
    </main>

    <footer>
        © RRT Games 2026
    </footer>

<script>
    // Subtle parallax on mouse move
    document.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth - 0.5) * 20;
        const y = (e.clientY / window.innerHeight - 0.5) * 20;
        document.querySelector('.bg::before');
        document.querySelectorAll('.card').forEach((card, i) => {
            const mult = i === 0 ? 1 : -1;
            card.style.transform = `translateY(${card.matches(':hover') ? -8 : 0}px) rotateX(${y * 0.05 * mult}deg) rotateY(${x * 0.05 * mult}deg)`;
        });
    });

    // Reset on mouse leave
    document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('mouseleave', () => {
            card.style.transform = '';
        });
    });
</script>
</body>
</html>
